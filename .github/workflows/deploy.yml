name: Test & Deploy

on:
  push:
    branches: [main, develop]

jobs:
  backend:
    runs-on: ubuntu-latest
    env:
      APP_SUPABASE_JWT_SECRET: test-jwt-secret
      DATABASE_URL: ""
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - run: uv sync --frozen --all-extras

      - run: uv run pytest tests/ -x
        continue-on-error: true  # No tests yet — remove when tests are added

  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - run: cd frontend && npm ci

      - name: TypeScript check
        run: cd frontend && npx tsc -b

      - name: Build
        run: cd frontend && npm run build

  deploy:
    needs: [backend, frontend]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    concurrency:
      group: deploy-${{ github.ref_name }}
    env:
      IS_PROD: ${{ github.ref_name == 'main' }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set environment
        id: env
        run: |
          if [ "${{ github.ref_name }}" = "main" ]; then
            echo "service_id=${{ secrets.RENDER_SERVICE_ID_PROD }}" >> "$GITHUB_OUTPUT"
            echo "health_url=${{ secrets.HEALTH_URL_PROD }}" >> "$GITHUB_OUTPUT"
            echo "env_name=production" >> "$GITHUB_OUTPUT"
          else
            echo "service_id=${{ secrets.RENDER_SERVICE_ID_DEV }}" >> "$GITHUB_OUTPUT"
            echo "health_url=${{ secrets.HEALTH_URL_DEV }}" >> "$GITHUB_OUTPUT"
            echo "env_name=development" >> "$GITHUB_OUTPUT"
          fi

      - name: Determine version
        id: tag
        run: |
          LATEST=$(git describe --tags --match "v*" --abbrev=0 2>/dev/null || echo "v0.0.0")
          if [ "${{ github.ref_name }}" = "main" ]; then
            COMMIT_MSG=$(git log -1 --format=%B)
            EXPLICIT=$(echo "$COMMIT_MSG" | grep -oP '(?i)release:\s*v?\K[0-9]+\.[0-9]+\.[0-9]+' | head -1)
            if [ -n "$EXPLICIT" ]; then
              NEW_TAG="v${EXPLICIT}"
              echo "Explicit version from commit: $NEW_TAG"
            else
              MAJOR=$(echo "$LATEST" | sed 's/^v//' | cut -d. -f1)
              MINOR=$(echo "$LATEST" | sed 's/^v//' | cut -d. -f2)
              PATCH=$(echo "$LATEST" | sed 's/^v//' | cut -d. -f3)
              NEW_TAG="v${MAJOR}.${MINOR}.$((PATCH + 1))"
              echo "Auto patch bump: $LATEST → $NEW_TAG"
            fi
            git tag "$NEW_TAG"
            git push origin "$NEW_TAG"
            echo "new_version=${NEW_TAG#v}" >> "$GITHUB_OUTPUT"
          else
            # develop: use latest tag + dev suffix, no new tag
            VERSION="${LATEST#v}-dev.$(git rev-parse --short HEAD)"
            echo "Dev version: $VERSION"
            echo "new_version=$VERSION" >> "$GITHUB_OUTPUT"
          fi

      - name: Set APP_VERSION on Render
        run: |
          SERVICE_ID="${{ steps.env.outputs.service_id }}"
          if [ "$SERVICE_ID" = "PLACEHOLDER" ] || [ -z "$SERVICE_ID" ]; then
            echo "No Render service configured for ${{ steps.env.outputs.env_name }}, skipping"
            exit 0
          fi
          CURRENT=$(curl -s "https://api.render.com/v1/services/$SERVICE_ID/env-vars" \
            -H "Authorization: Bearer ${{ secrets.RENDER_API_KEY }}")
          UPDATED=$(echo "$CURRENT" | jq --arg ver "${{ steps.tag.outputs.new_version }}" \
            '[.[] | .envVar | select(.key != "APP_VERSION")] + [{"key":"APP_VERSION","value":$ver}]')
          curl -s -X PUT "https://api.render.com/v1/services/$SERVICE_ID/env-vars" \
            -H "Authorization: Bearer ${{ secrets.RENDER_API_KEY }}" \
            -H "Content-Type: application/json" \
            -d "$UPDATED" > /dev/null

      - name: Trigger Render deploy
        id: trigger
        run: |
          SERVICE_ID="${{ steps.env.outputs.service_id }}"
          if [ "$SERVICE_ID" = "PLACEHOLDER" ] || [ -z "$SERVICE_ID" ]; then
            echo "No Render service configured for ${{ steps.env.outputs.env_name }}, skipping deploy"
            echo "deploy_id=skip" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          DEPLOY=$(curl -s -X POST "https://api.render.com/v1/services/$SERVICE_ID/deploys" \
            -H "Authorization: Bearer ${{ secrets.RENDER_API_KEY }}" \
            -H "Content-Type: application/json" \
            -d '{"clearCache":"do_not_clear"}')
          DEPLOY_ID=$(echo "$DEPLOY" | jq -r '.deploy.id // .id // empty')
          if [ -z "$DEPLOY_ID" ]; then
            echo "POST returned no deploy ID, fetching latest deploy..."
            sleep 2
            DEPLOY_ID=$(curl -s "https://api.render.com/v1/services/${{ steps.env.outputs.service_id }}/deploys?limit=1" \
              -H "Authorization: Bearer ${{ secrets.RENDER_API_KEY }}" | jq -r '.[0].deploy.id // .[0].id')
          fi
          echo "deploy_id=$DEPLOY_ID" >> "$GITHUB_OUTPUT"
          echo "Deploying ${{ steps.tag.outputs.new_version }} to ${{ steps.env.outputs.env_name }} (deploy: $DEPLOY_ID)"

      - name: Wait for deploy
        if: steps.trigger.outputs.deploy_id != 'skip'
        run: |
          for i in $(seq 1 60); do
            STATUS=$(curl -s "https://api.render.com/v1/services/${{ steps.env.outputs.service_id }}/deploys/${{ steps.trigger.outputs.deploy_id }}" \
              -H "Authorization: Bearer ${{ secrets.RENDER_API_KEY }}" | jq -r '.deploy.status // .status // empty')
            echo "Attempt $i/60: $STATUS"
            case "$STATUS" in
              live) echo "Deploy successful!"; exit 0 ;;
              deactivated|build_failed|update_failed|canceled|pre_deploy_failed) echo "Deploy failed: $STATUS"; exit 1 ;;
            esac
            sleep 15
          done
          echo "Timed out waiting for deploy"; exit 1

      - name: Verify health
        if: success() && steps.trigger.outputs.deploy_id != 'skip'
        run: |
          HEALTH_URL="${{ steps.env.outputs.health_url }}"
          if [ -n "$HEALTH_URL" ]; then
            HEALTH=$(curl -s "$HEALTH_URL")
            echo "$HEALTH" | jq .
            OK=$(echo "$HEALTH" | jq -r '.ok')
            if [ "$OK" != "true" ]; then
              echo "Health check failed"; exit 1
            fi
            echo "App healthy on ${{ steps.env.outputs.env_name }}"
          else
            echo "No health URL configured, skipping"
          fi
