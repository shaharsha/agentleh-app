name: Test & Deploy

on:
  push:
    branches: [main, develop]

jobs:
  backend:
    runs-on: ubuntu-latest
    env:
      APP_SUPABASE_JWT_SECRET: test-jwt-secret
      DATABASE_URL: ""
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - run: uv sync --frozen --all-extras

      - run: uv run pytest tests/ -x

  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - run: cd frontend && npm ci

      - name: TypeScript check
        run: cd frontend && npx tsc -b

      - name: Build
        run: cd frontend && npm run build

  deploy:
    needs: [backend, frontend]
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
    concurrency:
      group: deploy-${{ github.ref_name }}
    env:
      IS_PROD: ${{ github.ref_name == 'main' }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set environment
        id: env
        run: |
          if [ "${{ github.ref_name }}" = "main" ]; then
            echo "service=agentleh-app" >> "$GITHUB_OUTPUT"
            echo "health_url=https://app.agentiko.io/health" >> "$GITHUB_OUTPUT"
            echo "env_name=production" >> "$GITHUB_OUTPUT"
            echo "vite_supabase_url=https://hizznfloknpqtznywwsj.supabase.co" >> "$GITHUB_OUTPUT"
            echo "vite_supabase_anon_key=eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImhpenpuZmxva25wcXR6bnl3d3NqIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU1NDcwOTQsImV4cCI6MjA5MTEyMzA5NH0.WBH7xyzxwjG_YaUhTgoPkxxmRNmmok8QQdO2MrAdvec" >> "$GITHUB_OUTPUT"
            echo "vite_landing_url=https://agentiko.io" >> "$GITHUB_OUTPUT"
          else
            echo "service=agentleh-app-dev" >> "$GITHUB_OUTPUT"
            echo "health_url=https://app-dev.agentiko.io/health" >> "$GITHUB_OUTPUT"
            echo "env_name=development" >> "$GITHUB_OUTPUT"
            echo "vite_supabase_url=https://mnetqtjwcdunznvvfaob.supabase.co" >> "$GITHUB_OUTPUT"
            echo "vite_supabase_anon_key=eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im1uZXRxdGp3Y2R1bnpudnZmYW9iIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU1NDc0NTMsImV4cCI6MjA5MTEyMzQ1M30.QdtX_YczXzokSS6vfqDcMFGQcZFPCmgT4Arspvb8I8c" >> "$GITHUB_OUTPUT"
            echo "vite_landing_url=https://dev.agentiko.io" >> "$GITHUB_OUTPUT"
          fi

      - name: Determine version
        id: tag
        run: |
          LATEST=$(git describe --tags --match "v*" --abbrev=0 2>/dev/null || echo "v0.0.0")
          if [ "${{ github.ref_name }}" = "main" ]; then
            COMMIT_MSG=$(git log -1 --format=%B)
            EXPLICIT=$(echo "$COMMIT_MSG" | grep -oP '(?i)release:\s*v?\K[0-9]+\.[0-9]+\.[0-9]+' | head -1)
            if [ -n "$EXPLICIT" ]; then
              NEW_TAG="v${EXPLICIT}"
            else
              MAJOR=$(echo "$LATEST" | sed 's/^v//' | cut -d. -f1)
              MINOR=$(echo "$LATEST" | sed 's/^v//' | cut -d. -f2)
              PATCH=$(echo "$LATEST" | sed 's/^v//' | cut -d. -f3)
              NEXT=$((PATCH + 1))
              while git rev-parse "v${MAJOR}.${MINOR}.${NEXT}" >/dev/null 2>&1; do
                NEXT=$((NEXT + 1))
              done
              NEW_TAG="v${MAJOR}.${MINOR}.${NEXT}"
            fi
            git tag "$NEW_TAG"
            git push origin "$NEW_TAG"
            echo "tag=$NEW_TAG" >> "$GITHUB_OUTPUT"
          else
            echo "tag=${LATEST}-dev.$(git rev-parse --short HEAD)" >> "$GITHUB_OUTPUT"
          fi

      - name: Auth to GCP (Workload Identity Federation)
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WIF_PROVIDER }}
          service_account: ${{ secrets.GCP_DEPLOY_SA }}

      - name: Set up gcloud
        uses: google-github-actions/setup-gcloud@v2

      - name: Build image via Cloud Build
        run: |
          gcloud builds submit \
            --config=cloudbuild.yaml \
            --region=europe-west3 \
            --substitutions=_TAG="${{ steps.tag.outputs.tag }}",_SERVICE="${{ steps.env.outputs.service }}",_VITE_SUPABASE_URL="${{ steps.env.outputs.vite_supabase_url }}",_VITE_SUPABASE_ANON_KEY="${{ steps.env.outputs.vite_supabase_anon_key }}",_VITE_LANDING_URL="${{ steps.env.outputs.vite_landing_url }}" \
            .

      - name: Deploy to Cloud Run
        run: |
          gcloud run deploy ${{ steps.env.outputs.service }} \
            --image=europe-west3-docker.pkg.dev/agentleh/images/${{ steps.env.outputs.service }}:${{ steps.tag.outputs.tag }} \
            --region=europe-west3 \
            --quiet

      - name: Verify health
        run: |
          for i in $(seq 1 20); do
            HEALTH=$(curl -sS "${{ steps.env.outputs.health_url }}" 2>&1 || echo "{}")
            OK=$(echo "$HEALTH" | jq -r '.ok // "false"')
            if [ "$OK" = "true" ]; then
              echo "App healthy on ${{ steps.env.outputs.env_name }}"
              exit 0
            fi
            sleep 5
          done
          echo "Health check failed"; exit 1
