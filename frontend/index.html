<!doctype html>
<html lang="he" dir="rtl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="color-scheme" content="light dark" />
    <meta name="theme-color" content="#FDF8F4" media="(prefers-color-scheme: light)" />
    <meta name="theme-color" content="#0F0B08" media="(prefers-color-scheme: dark)" />
    <title>Agentiko</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Rubik:wght@400;500;600;700&display=swap" rel="stylesheet" />
    <script>
      // Resolve the active theme BEFORE React mounts. Single line goal:
      // no flash of light content on a dark-mode-pinned user, and vice
      // versa. Must match the resolution order in src/lib/theme.tsx:
      //   1. localStorage['agentleh.theme'] if it's 'light' or 'dark'
      //   2. prefers-color-scheme media query (the 'auto' path)
      (function () {
        try {
          var saved = localStorage.getItem('agentleh.theme');
          var mode;
          if (saved === 'light' || saved === 'dark') {
            mode = saved;
          } else {
            mode = window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches
              ? 'dark'
              : 'light';
          }
          document.documentElement.setAttribute('data-theme', mode);
        } catch (e) {
          // localStorage / matchMedia disabled — default to light so at
          // least the page renders something sane.
          document.documentElement.setAttribute('data-theme', 'light');
        }
      })();
    </script>
    <script>
      // Resolve the active language + direction BEFORE React mounts so
      // the very first paint matches whatever the user will see. Runs
      // synchronously in plain JS (no JSX, no modules) so there's no
      // flash of the wrong direction between the static HTML and the
      // I18nProvider useEffect firing.
      //
      // Resolution order MUST match src/lib/i18n.tsx::pickInitialLang:
      //   1. localStorage explicit pick (user clicked switcher)
      //   2. navigator.languages walk — first supported primary tag
      //      wins. `iw` is the legacy Chrome code for Hebrew.
      //   3. Product default: Hebrew (agentleh is Israeli-first; any
      //      non-he/en browser language falls to Hebrew, not English).
      (function () {
        try {
          var lang;
          // 0. ?lang= handoff from the landing page (different origin,
          //    so localStorage isn't shared). If present, honor it and
          //    persist — the React-side pickInitialLang also strips the
          //    param via replaceState so it never leaks into bookmarks.
          var params = new URLSearchParams(window.location.search);
          var param = params.get('lang');
          if (param === 'he' || param === 'en') {
            localStorage.setItem('agentleh.lang', param);
            lang = param;
          }
          var saved = lang || localStorage.getItem('agentleh.lang');
          if (saved === 'he' || saved === 'en') {
            lang = saved;
          } else {
            var langs =
              navigator.languages && navigator.languages.length
                ? navigator.languages
                : [navigator.language || 'he'];
            lang = 'he';
            for (var i = 0; i < langs.length; i++) {
              var primary = String(langs[i]).toLowerCase().split('-')[0];
              if (primary === 'he' || primary === 'iw') {
                lang = 'he';
                break;
              }
              if (primary === 'en') {
                lang = 'en';
                break;
              }
            }
          }
          document.documentElement.lang = lang;
          document.documentElement.dir = lang === 'he' ? 'rtl' : 'ltr';
        } catch (e) {
          // localStorage or navigator disabled — keep html defaults
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
